<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종합 매출 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333333; --primary-color: #4f46e5; }
    body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #1e1b4b; }
    .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .kpi-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
    .kpi-title { font-size: 14px; color: #666; margin-bottom: 10px; }
    .kpi-value { font-size: 24px; font-weight: bold; color: var(--primary-color); }
    .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; }
    .chart-card, .table-card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #1e1b4b; }
    .chart-container { position: relative; height: 300px; width: 100%; }
    #loading { text-align: center; font-size: 18px; font-weight: bold; margin-top: 50px; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; }
    th { background-color: #f8fafc; color: #475569; }
  </style>
</head>
<body>

  <div id="loading">📊 실시간 대시보드 데이터를 불러오는 중...</div>

  <div class="container" id="dashboard" style="display: none;">
    <h1>📊 실시간 매출 및 재고 대시보드</h1>
    
    <div class="kpi-container">
      <div class="kpi-card"><div class="kpi-title">🛒 총 판매 건수</div><div class="kpi-value" id="sales-count">-</div></div>
      <div class="kpi-card"><div class="kpi-title">💰 총 매출액</div><div class="kpi-value" id="sales-amount">-</div></div>
      <div class="kpi-card"><div class="kpi-title">💳 평균 주문 금액</div><div class="kpi-value" id="avg-order">-</div></div>
      <div class="kpi-card"><div class="kpi-title">📦 총 입고 금액</div><div class="kpi-value" id="inbound-amount">-</div></div>
    </div>

    <div class="content-grid">
      <div class="chart-card">
        <div class="card-title">🏷️ 카테고리별 매출 비중</div>
        <div class="chart-container"><canvas id="categoryChart"></canvas></div>
      </div>
      <div class="table-card">
        <div class="card-title">📋 카테고리별 매출 상세</div>
        <table>
          <thead><tr><th>카테고리</th><th>판매수량</th><th>판매금액</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // 💡 네가 복사해 준 새 웹앱 URL 주소 적용 완료!
    const gasUrl = "https://script.google.com/macros/s/AKfycbwSjEMRFTwhYueNk1-2YS6CRv2ChHDmFISG6BF4E4LLCDIqzhCQxgLzypaqA2jOWBf9/exec";

    // 보안 우회(CORS 해결)를 위한 JSONP 호출 방식
    function jsonpFetch(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'callback_' + Math.round(100000 * Math.random());
        window[callbackName] = function(data) {
          delete window[callbackName];
          document.body.removeChild(script);
          resolve(data);
        };
        const script = document.createElement('script');
        script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
        document.body.appendChild(script);
      });
    }

    async function loadDashboardData() {
      try {
        const data = await jsonpFetch(gasUrl);

        if(data.error) {
          document.getElementById('loading').innerText = data.error;
          return;
        }

        // KPI 값 세팅
        document.getElementById('sales-count').innerText = `${Number(data.kpis.totalSalesCount.value).toLocaleString()} ${data.kpis.totalSalesCount.unit}`;
        document.getElementById('sales-amount').innerText = `${Number(data.kpis.totalSalesAmount.value).toLocaleString()} ${data.kpis.totalSalesAmount.unit}`;
        document.getElementById('avg-order').innerText = `${Math.round(data.kpis.avgOrderAmount.value).toLocaleString()} ${data.kpis.avgOrderAmount.unit}`;
        document.getElementById('inbound-amount').innerText = `${Number(data.kpis.totalInboundAmount.value).toLocaleString()} ${data.kpis.totalInboundAmount.unit}`;

        const labels = [];
        const chartData = [];
        let tableHtml = "";

        data.categorySales.forEach(item => {
          labels.push(item.category);
          chartData.push(item.amount);
          tableHtml += `<tr><td><strong>${item.category}</strong></td><td>${item.quantity.toLocaleString()}개</td><td>${item.amount.toLocaleString()}원</td></tr>`;
        });
        document.getElementById('table-body').innerHTML = tableHtml;

        // 차트 그리기
        const ctx = document.getElementById('categoryChart').getContext('2d');
        new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: labels,
            datasets: [{
              data: chartData,
              backgroundColor: ['#4f46e5', '#06b6d4', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6'],
              borderWidth: 2
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

      } catch (error) {
        console.error("데이터 로드 실패:", error);
        document.getElementById('loading').innerText = "데이터 연결에 실패했습니다. Apps Script 배포를 다시 확인해 주세요.";
      }
    }

    window.onload = loadDashboardData;
  </script>
</body>
</html>
